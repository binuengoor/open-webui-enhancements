services:
  enhanced-websearch:
    build: .
    image: ghcr.io/binuengoor/enhanced-websearch:latest
    user: "1000:1000"
    container_name: enhanced-websearch
    env_file:
      - .env
    ports:
      - "8091:8091"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./artifacts/reports:/app/artifacts/reports
    restart: unless-stopped


