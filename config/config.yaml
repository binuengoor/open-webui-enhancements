service:
  request_timeout_s: 25

routing:
  policy: rotating_weighted
  cooldown_seconds: 90
  failure_threshold: 2

search_limits:
  max_provider_attempts: 2
  max_pages_to_fetch: 5

providers:
  - name: searxng
    kind: searxng
    enabled: true
    weight: 3
    timeout_s: 12
    base_url: ${EWS_SEARXNG_BASE_URL}

  - name: brave-search
    kind: litellm-search
    enabled: true
    weight: 1
    timeout_s: 12
    base_url: ${EWS_LITELLM_SEARCH_BASE_URL}
    litellm_provider: brave-search

  - name: serper
    kind: litellm-search
    enabled: true
    weight: 1
    timeout_s: 12
    base_url: ${EWS_LITELLM_SEARCH_BASE_URL}
    litellm_provider: serper

  - name: exa
    kind: litellm-search
    enabled: true
    weight: 1
    timeout_s: 12
    base_url: ${EWS_LITELLM_SEARCH_BASE_URL}
    litellm_provider: exa

  - name: tavily
    kind: litellm-search
    enabled: true
    weight: 1
    timeout_s: 12
    base_url: ${EWS_LITELLM_SEARCH_BASE_URL}
    litellm_provider: tavily

  - name: firecrawl
    kind: litellm-search
    enabled: true
    weight: 1
    timeout_s: 12
    base_url: ${EWS_LITELLM_SEARCH_BASE_URL}
    litellm_provider: firecrawl

  - name: linkup
    kind: litellm-search
    enabled: true
    weight: 1
    timeout_s: 12
    base_url: ${EWS_LITELLM_SEARCH_BASE_URL}
    litellm_provider: linkup

cache:
  enabled: true
  max_entries: 1000
  ttl_general_s: 300
  ttl_recency_s: 45
  page_cache_ttl_s: 120

scraping:
  user_agent: EnhancedWebsearchService/1.0
  request_timeout_s: 18
  max_content_chars: 30000
  min_content_chars: 80
  flaresolverr_url: ${EWS_FLARESOLVERR_URL}

vane:
  enabled: true
  url: ${VANE_URL}
  timeout_s: 25
  chat_provider_id: ${VANE_CHAT_PROVIDER_ID}
  chat_model_key: ${VANE_CHAT_MODEL_KEY}
  embedding_provider_id: ${VANE_EMBED_PROVIDER_ID}
  embedding_model_key: ${VANE_EMBED_MODEL_KEY}

logging:
  level: INFO
  json: false